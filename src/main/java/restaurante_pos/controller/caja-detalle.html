<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <title>Cierre de Cuenta - La Sanjuanera</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #121212;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .factura-box {
            background: #1e1e1e;
            width: 480px;
            padding: 30px;
            border-radius: 20px;
            border: 2px dashed #4caf50;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .text-center { text-align: center; }
        h1 { color: #4caf50; font-size: 28px; margin-bottom: 5px; }
        .sub { color: #b0bec5; font-size: 14px; margin-bottom: 20px; }
        .info-mesa {
            background: #2e7d32;
            padding: 10px;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 25px;
        }
        .tabla-items {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
        }
        .tabla-items th {
            border-bottom: 2px solid #444;
            padding-bottom: 10px;
            color: #b0bec5;
            font-size: 14px;
            text-transform: uppercase;
        }
        .tabla-items td {
            padding: 12px 0;
            border-bottom: 1px dashed #333;
            font-size: 16px;
        }
        .linea-total {
            border-top: 2px dashed #4caf50;
            padding-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .btn-pagar {
            background: #4caf50;
            color: white;
            border: none;
            padding: 18px;
            font-size: 20px;
            font-weight: bold;
            width: 100%;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
        }
        .btn-pagar:hover { background: #66bb6a; }
        .btn-atras {
            display: block;
            text-align: center;
            color: #b0bec5;
            margin-top: 15px;
            text-decoration: none;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="factura-box">
        <div class="text-center">
            <h1>LA SANJUANERA POS</h1>
            <p class="sub">Sistema de Facturación Operativo</p>
            
            <div class="info-mesa">
                💵 CUENTA: <span th:text="${mesa}">Mesa 1</span>
            </div>
        </div>

        <!-- Detalle de consumo -->
        <table class="tabla-items">
            <thead>
                <tr>
                    <th style="text-align: left;">Detalle</th>
                    <th style="text-align: center;">Cant.</th>
                    <th style="text-align: right;">Total</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${pedidos}">
                    <td>
                        <span th:text="${item.plato}" style="font-weight: bold; display: block;">Plato</span>
                        <small th:text="'🥤 ' + ${item.bebida}" style="color: #2196f3;"></small>
                    </td>
                    <td th:text="${item.cantidad}" class="text-center">1</td>
                    <td th:text="${#numbers.formatCurrency(item.getSubtotal())}" style="text-align: right;">$0.00</td>
                </tr>
            </tbody>
        </table>

        <!-- Gran Total -->
        <div class="linea-total">
            <span style="font-size: 20px; font-weight: bold; color: #b0bec5;">TOTAL NETO:</span>
            <span style="font-size: 32px; font-weight: bold; color: #ffeb3b;" th:text="${#numbers.formatCurrency(total)}">$0.00</span>
        </div>

        <!-- Formulario de Acción para confirmar el Recaudo -->
        <form th:action="@{/caja/pagar/{nombre}(nombre=${mesa})}" method="post">
            <button type="submit" class="btn-pagar">
                ✅ CONFIRMAR PAGO Y EMITIR TICKET
            </button>
        </form>

        <a href="/" class="btn-atras">Volver al Panel</a>
    </div>

</body>
</html>
