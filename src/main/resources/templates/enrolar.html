<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrolamiento Inicial - POS La Sanjuanera</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 10px; }
        p { color: #7f8c8d; font-size: 14px; margin-bottom: 25px; }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        input, select { width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #2ecc71; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background-color: #27ae60; }
    </style>
</head>
<body>
    <div class="card">
        <h2>¡Bienvenido al POS!</h2>
        <p>Detectamos que es el primer inicio del sistema. Por favor registra la cuenta del Administrador Principal.</p>
        
        <form action="/enrolar" method="POST">
            <div class="form-group">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ej. Administrador Principal" required>
            </div>
            <div class="form-group">
                <label for="pin">Establecer PIN de Acceso (Numérico):</label>
                <input type="password" id="pin" name="pin" placeholder="Ej. 1234" pattern="[0-9]+" required>
            </div>
            <input type="hidden" name="rol" value="ADMINISTRADOR">
            <button type="submit">Finalizar Enrolamiento y Activar POS</button>
        </form>
    </div>
</body>
</html>
