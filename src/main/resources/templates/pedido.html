<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <title>Pedidos</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        body{
            font-family:Arial, Helvetica, sans-serif;
            background:#111;
            color:white;
        }
        .container{
            display:flex;
            height:100vh;
        }
        .menu{
            width:50%;
            background:#263238;
            padding:30px;
            overflow-y:auto;
            border-right:4px solid #00d1b2;
        }
        .pedidos{
            width:50%;
            padding:30px;
            overflow-y:auto;
        }
        h1{
            margin-bottom:30px;
            font-size:50px;
        }
        .grid-platos{
            display:grid;
            grid-template-columns:repeat(2, 1fr);
            gap:25px;
        }
        .plato-btn{
            background:#00bfa5;
            color:white;
            text-decoration:none;
            font-size:25px;
            font-weight:bold;
            padding:45px;
            border-radius:20px;
            text-align:center;
            transition:0.2s;
        }
        .plato-btn:hover{
            background:#00d9bb;
            transform:scale(1.02);
        }
        .pedido-card{
            background:#263238;
            padding:25px;
            border-radius:20px;
            margin-bottom:20px;
        }
        .pedido-card h2{
            margin-bottom:15px;
            font-size:35px;
        }
        .estado{
            color:white;
            display:inline-block;
            padding:10px 18px;
            border-radius:10px;
            font-size:18px;
            font-weight:bold;
            margin-bottom:20px;
        }
        .pedido-card ul{
            margin-left:20px;
            margin-bottom:20px;
        }
        .pedido-card li{
            margin-bottom:10px;
            font-size:22px;
        }
        .bebida{
            font-size:24px;
            margin-bottom:20px;
        }
        .acciones{
            display:flex;
            gap:10px;
            margin-top:20px;
        }
        .btn-cambiar, .btn-editar, .btn-eliminar{
            flex:1;
            border:none;
            padding:18px;
            border-radius:12px;
            color:white;
            font-size:20px;
            cursor:pointer;
            font-weight:bold;
            text-align:center;
            text-decoration:none;
        }
        .btn-cambiar{
            background:#ff9800;
        }
        .btn-editar{
            background:#2196f3;
        }
        .btn-eliminar{
            background:#e53935;
        }
        .btn-eliminar:hover{
            background:#ff4c48;
        }
        .mesa-tag{
            background:#00bfa5;
            display:inline-block;
            padding:8px 15px;
            border-radius:10px;
            margin-bottom:15px;
            font-weight:bold;
            font-size:18px;
        }
        .observacion{
            margin-top:15px;
            font-size:20px;
            color:#ffd54f;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>
<div class="container">
    
    <!-- Sección Izquierda: Menú de selección -->
    <div class="menu">
        <div style="background: #263238; padding: 15px; border-bottom: 2px solid #00bfa5; margin-bottom: 20px;">
            <a href="/" style="background: #37474f; color: white; padding: 10px 20px; border-radius: 10px; text-decoration: none; font-weight: bold; font-size: 18px; display: inline-block;">
                🏠 VOLVER AL MAPA DE MESAS
            </a>
        </div>
        
        <h1>Menú - <span th:text="${mesa}"></span></h1>
        
        <!-- Firma de auditoría y empleado logueado -->
        <div style="background: #1f1f1f; padding: 10px 15px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid #2ecc71;">
            <span style="color: #cbd5e1; font-size: 14px;">Atendiendo:</span>
            <strong style="color: #ffffff; font-size: 16px; display: block;" th:text="${nombreMesero}">Nombre del Mesero</strong>
        </div>
        
        <div class="grid-platos">
            <a th:each="plato : ${platos}" 
               th:href="@{/configurar/{mesa}/{plato}(mesa=${mesa}, plato=${plato.nombre})}" 
               class="plato-btn" 
               th:text="${plato.nombre}">
            </a>
        </div>
    </div>

    <!-- Sección Derecha: Comandas actuales de la mesa -->
    <div class="pedidos">
        <h1>Pedidos Actuales</h1>
        
        <!-- CONTENEDOR DE ACTUALIZACIÓN AUTOMÁTICA -->
        <div id="seccion-pedidos">
            
            <!-- Tarjeta del Total de Cuenta formateado profesionalmente -->
            <div style="background: #1a2327; border: 2px solid #ffd54f; border-radius: 15px; padding: 20px; margin-bottom: 25px; text-align: center;">
                <span style="font-size: 20px; color: #b0bec5; font-weight: bold; text-transform: uppercase;">💰 Total Cuenta Actual</span>
                <!-- Se cambió a formatCurrency para soportar BigDecimal sin errores de redondeo de centavos -->
                <h2 style="font-size: 42px; color: #ffd54f; margin-top: 5px;" th:text="${#numbers.formatCurrency(total)}">
                    $0
                </h2>
            </div>

            <!-- Botón General de Enviar Orden Completa -->
            <div style="margin-bottom: 25px;">
                <a th:href="@{/enviar-cocina/{mesa}(mesa=${mesa})}" 
                   style="background: #00c853; color: white; display: block; text-align: center; padding: 22px; border-radius: 15px; font-size: 22px; font-weight: bold; text-decoration: none; transition: 0.2s;" 
                   onmouseover="this.style.background='#00e676'" 
                   onmouseout="this.style.background='#00c853'">
                    🚀 ENVIAR PEDIDO A COCINA
                </a>
            </div>

            <!-- Iteración de las tarjetas de platos en comanda -->
            <div class="pedido-card" th:each="pedido, iterStat : ${pedidos}">
                <div class="mesa-tag">
                    🍽 <span th:text="${pedido.mesa}"></span>
                </div>
                
                <!-- Título dinámico que expone el plato y su cantidad en burbuja -->
                <h2 style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                    <span th:text="${pedido.plato}"></span>
                    <span style="background: #00bfa5; color: white; padding: 2px 12px; border-radius: 8px; font-size: 22px;" 
                          th:text="'x' + ${pedido.cantidad}">x1</span>
                </h2>
                
                <!-- Bloque de desglose financiero del producto -->
                <div style="font-size: 18px; color: #b0bec5; margin-bottom: 15px;">
                    <span th:text="${#numbers.formatCurrency(pedido.precioUnitario)}"></span> c/u 
                    <span style="color: #ffd54f; font-weight: bold; margin-left: 10px;" 
                          th:text="'(Subtotal: ' + ${#numbers.formatCurrency(pedido.getSubtotal())} + ')'"></span>
                </div>

                <!-- Control de colores del Estado actual -->
                <div class="estado" 
                     th:style="${pedido.estado == 'CARRITO'} ? 'background:#9c27b0;' : (${pedido.estado == 'PENDIENTE'} ? 'background:#ff9800;' : (${pedido.estado == 'PREPARANDO'} ? 'background:#2196f3;' : (${pedido.estado == 'LISTO'} ? 'background:#00c853;' : 'background:#616161;')))" 
                     th:text="${pedido.estado == 'CARRITO' ? '🛒 CARRITO' : pedido.estado}">
                </div>

                <ul>
                    <li th:each="acompanamiento : ${pedido.acompanamientos}" th:text="'✔ ' + ${acompanamiento}">
                    </li>
                </ul>
                
                <div class="bebida">
                    🥤 <span th:text="${pedido.bebida}"></span>
                </div>
                
                <div class="observacion" th:if="${pedido.observacion != null && pedido.observacion != ''}">
                    📝 <span th:text="${pedido.observacion}"></span>
                </div>

                <!-- Bloques lógicos de Acciones según estado del plato -->
                <div class="acciones">
                    <!-- Flujo si está en CARRITO temporal -->
                    <th:block th:if="${pedido.estado == 'CARRITO'}">
                        <span style="color: #e040fb; font-size: 18px; font-weight: bold; padding: 18px 0; flex: 1;">
                            ⏳ Esperando envío...
                        </span>
                        <a class="btn-eliminar" 
                           th:href="@{/eliminar/{mesa}/{index}(mesa=${mesa}, index=${iterStat.index})}" 
                           onclick="return confirm('¿Deseas quitar este plato del carrito?')">
                            🗑 Eliminar
                        </a>
                    </th:block>

                                    <!-- Flujo si ya está enviado a producción -->
                <th:block th:if="${pedido.estado != 'CARRITO'}">
                    <span style="font-size: 18px; font-weight: bold; padding: 18px 0; flex: 1;" 
                          th:style="${pedido.estado == 'LISTO'} ? 'color:#00c853; text-transform:uppercase; animation: blink 1.5s infinite;' : 'color:#b0bec5;'">
                        <span th:text="${pedido.estado == 'LISTO'} ? '🔔 ¡RECOGER EN BARRA!' : '⏳ En cola de cocina...'"></span>
                    </span>
                </th:block>
            </div> 
            
        </div> <!-- Cierre tarjeta (.pedido-card) -->
        
        <!-- Mensaje opcional por si la mesa no tiene nada en comanda -->
        <div th:if="${#lists.isEmpty(pedidos)}" style="text-align: center; color: #b0bec5; padding: 40px 0; font-size: 20px;">
            No hay productos cargados en esta mesa.
        </div>

    </div> <!-- Cierre id="seccion-pedidos" -->
</div> <!-- Cierre clase .pedidos -->
</div> <!-- Cierre clase .container -->

<!-- SCRIPT DE REFRESCO SILENCIOSO Y CONTROL DE ALERTAS OPERATIVAS -->
<script>
setInterval(async () => {
    // 1. Obtener de forma segura el nombre de la mesa inyectado por Thymeleaf
    const mesaActual = "[[${mesa}]]";
    
    try {
        // 2. Consulta paralela de alertas de pago desde la caja
        const resAlertas = await fetch('/mesero/alertas/' + encodeURIComponent(mesaActual));
        if (resAlertas.ok) {
            const alertas = await resAlertas.json();
            alertas.forEach(msg => alertasMeseroVisual(msg));
        }

        // 3. Refresco silencioso y asíncrono del contenedor de platos
        const resHtml = await fetch(window.location.href);
        if (resHtml.ok) {
            const htmlText = await resHtml.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');
            
            const seccionVieja = document.getElementById('seccion-pedidos');
            const seccionNueva = doc.getElementById('seccion-pedidos');
            
            if (seccionVieja && seccionNueva) {
                seccionVieja.innerHTML = seccionNueva.innerHTML;
            }
        }
    } catch (error) {
        console.warn("Error de reconexión con el servidor POS: ", error);
    }
}, 4000);

/**
 * Despliega una alerta emergente estética en la pantalla del dispositivo del mesero
 */
function alertasMeseroVisual(mensaje) {
    const alertaDiv = document.createElement('div');
    
    // Aplicación de estilos optimizados para producción (Estilo Toast profesional)
    Object.assign(alertaDiv.style, {
        position: 'fixed',
        top: '20px',
        left: '50%',
        transform: 'translateX(-50%)',
        background: '#00c853',
        color: 'white',
        padding: '20px 30px',
        borderRadius: '15px',
        fontSize: '22px',
        fontWeight: 'bold',
        boxShadow: '0 10px 25px rgba(0,0,0,0.5)',
        zIndex: '9999',
        opacity: '1',
        transition: 'opacity 0.4s ease'
    });
    
    alertaDiv.innerHTML = `🔔 ${mensaje}`;
    document.body.appendChild(alertaDiv);

    // Animación de salida (fade-out) y eliminación definitiva del DOM para no saturar memoria
    setTimeout(() => {
        alertaDiv.style.opacity = '0';
        setTimeout(() => {
            alertaDiv.remove();
        }, 400); // Remueve el elemento justo al terminar la transición de opacidad
    }, 6000);
}
</script>
